<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather 26</title>
    <script src="index.js" defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-100 flex items-center justify-center min-h-screen">
    <div id="app" class="bg-white p-8 rounded-xl shadow-lg w-96 text-center">
        <h1 class="text-2xl font-bold mb-4 text-blue-600">Weather App</h1>
        <input id="cityInput" type="text" placeholder="Enter city..." 
               class="border p-2 rounded w-full mb-4 outline-none focus:ring-2 focus:ring-blue-400">
        <button id="getWeather" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 transition w-full">
            Get Weather
        </button>
        <div id="weatherResult">
            <h2 id="cityName" class="text-xl font-semibold"></h2>
            <p id="temp" class="text-4xl font-bold my-2"></p>
            <p id="desc" class="italic text-gray-600"></p>
        </div>
    </div>
</body>
</html>
